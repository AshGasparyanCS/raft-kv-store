syntax = "proto3";

package kvstore;

option go_package = "kvraft/proto;kvstorepb";

// ============================================================
// Client-facing API.
//
// This mirrors the net/rpc surface in kv/server.go and kv/client.go.
// The sandbox this was built in can't fetch the gRPC toolchain
// (google.golang.org is off-allowlist), so the shipped wire layer is
// Go's net/rpc. On a networked machine you can generate gRPC stubs from
// this file and swap the transport without touching the Raft core:
//
//   protoc --go_out=. --go-grpc_out=. proto/kvstore.proto
//
// The KV state machine and Raft logic are transport-agnostic; only the
// thin adapters in cmd/kvnode and kv/client.go change.
// ============================================================

service KV {
  rpc Get    (GetRequest)       returns (GetResponse);
  rpc Put    (PutRequest)       returns (WriteResponse);
  rpc Append (PutRequest)       returns (WriteResponse);
  rpc Delete (DeleteRequest)    returns (WriteResponse);
  rpc Status (StatusRequest)    returns (StatusResponse);
}

message GetRequest {
  string key       = 1;
  int64  client_id = 2;
  int64  seq       = 3;
}
message GetResponse {
  string err   = 1; // "OK" | "ErrNoKey" | "ErrWrongLeader" | "ErrTimeout"
  string value = 2;
}

message PutRequest {
  string key       = 1;
  string value     = 2;
  int64  client_id = 3;
  int64  seq       = 4;
}
message DeleteRequest {
  string key       = 1;
  int64  client_id = 2;
  int64  seq       = 3;
}
message WriteResponse { string err = 1; }

message StatusRequest {}
message StatusResponse {
  int64 term      = 1;
  bool  is_leader = 2;
  int64 applied   = 3;
  int64 keys      = 4;
}

// ============================================================
// Inter-node consensus RPCs (Raft).
// ============================================================

service Raft {
  rpc RequestVote     (RequestVoteRequest)     returns (RequestVoteResponse);
  rpc AppendEntries   (AppendEntriesRequest)   returns (AppendEntriesResponse);
  rpc InstallSnapshot (InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

message LogEntry {
  int64 term    = 1;
  int64 index   = 2;
  bytes command = 3; // gob/proto-encoded Op
}

message RequestVoteRequest {
  int64 term           = 1;
  int64 candidate_id   = 2;
  int64 last_log_index = 3;
  int64 last_log_term  = 4;
}
message RequestVoteResponse {
  int64 term         = 1;
  bool  vote_granted = 2;
}

message AppendEntriesRequest {
  int64    term           = 1;
  int64    leader_id      = 2;
  int64    prev_log_index = 3;
  int64    prev_log_term  = 4;
  repeated LogEntry entries = 5;
  int64    leader_commit  = 6;
}
message AppendEntriesResponse {
  int64 term           = 1;
  bool  success        = 2;
  int64 conflict_index = 3;
  int64 conflict_term  = 4;
}

message InstallSnapshotRequest {
  int64 term                = 1;
  int64 leader_id           = 2;
  int64 last_included_index = 3;
  int64 last_included_term  = 4;
  bytes data                = 5;
}
message InstallSnapshotResponse { int64 term = 1; }
